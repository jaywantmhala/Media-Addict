<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Confirmed | Media Addict Studio</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        accent: '#2563EB',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-color: #F8FAFC;
            --grid-line: rgba(37, 99, 235, 0.012);
            --text-main: #0F172A;
            --text-muted: #475569;
            --card-bg: #FFFFFF;
            --card-border: rgba(37, 99, 235, 0.06);
            --card-shadow: 0 20px 40px rgba(37, 99, 235, 0.03), 0 1px 3px rgba(0, 0, 0, 0.01);
            --next-bg: #EFF6FF;
            --next-border: #DBEAFE;
            --next-text: #4B5563;
        }
        .dark {
            --bg-color: #030712;
            --grid-line: rgba(255, 255, 255, 0.01);
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --card-bg: rgba(15, 23, 42, 0.75);
            --card-border: rgba(37, 99, 235, 0.15);
            --card-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --next-bg: rgba(30, 41, 59, 0.4);
            --next-border: rgba(37, 99, 235, 0.15);
            --next-text: #94A3B8;
        }
        html, body {
            overflow-x: hidden;
            max-width: 100%;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 50px 50px;
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
        }
        .success-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            box-shadow: var(--card-shadow);
            transition: background-color 0.3s, border-color 0.3s, box-shadow 0.3s;
        }
        .next-box {
            background-color: var(--next-bg);
            border: 1px solid var(--next-border);
        }
    </style>
    <script>
        // Set class "dark" based on localStorage
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    
    <div class="success-card max-w-[420px] w-full rounded-[32px] p-8 text-center relative overflow-hidden">
        
        <!-- Logo -->
        <div class="mb-6">
            <img src="images/Media Addict logo png.png" alt="Media Addict Logo" class="h-12 mx-auto object-contain">
        </div>

        <!-- Glowing Checkmark Icon -->
        <div class="relative w-20 h-20 mx-auto mb-6 flex items-center justify-center">
            <!-- Glow effect -->
            <div class="absolute inset-0 bg-[#2563EB] rounded-full blur-[20px] opacity-15"></div>
            <!-- Icon circle -->
            <div class="relative z-10 w-[52px] h-[52px] rounded-full border-[3px] border-[#2563EB] flex items-center justify-center bg-transparent">
                <svg class="w-6 h-6 text-[#2563EB]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
        </div>
        
        <!-- Subtitle -->
        <h3 class="text-[#2563EB] font-bold text-[11px] tracking-[0.25em] uppercase mb-3">Payment Confirmed</h3>
        
        <!-- Title -->
        <h1 class="text-[34px] leading-tight font-black mb-5" style="color: var(--text-main)">Thank You!</h1>
        
        <!-- Body Text -->
        <p class="mb-8 text-[15px] leading-[1.6] px-1" style="color: var(--text-muted)">
            We received your payment of <strong class="text-[#2563EB]">₹99</strong>. Our team will contact you shortly with next steps.
        </p>
        
        <!-- Next Steps Box -->
        <div class="next-box rounded-[20px] py-4 px-5 mb-8 flex items-center justify-center gap-3 text-left">
            <span class="text-[#2563EB] font-bold text-[14px] shrink-0">Next:</span>
            <span class="text-[13px] leading-snug font-medium" style="color: var(--text-muted)">Check your WhatsApp/Email for confirmation.</span>
        </div>

        <!-- Button -->
        <a href="index.html" class="block w-full bg-[#2563EB] hover:bg-[#1D4ED8] text-white font-bold text-[17px] py-[15px] rounded-full shadow-[0_8px_20px_rgba(37, 99, 235, 0.2)] hover:shadow-[0_12px_25px_rgba(37, 99, 235, 0.3)] transition-all duration-300 transform hover:-translate-y-0.5 mb-6">
            Back to Website
        </a>

        <!-- Footer Text -->
        <p class="text-[11px] px-4 leading-[1.4]" style="color: var(--text-muted)">
            If you were not redirected automatically, you can safely refresh this page.
        </p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const paymentId = urlParams.get('razorpay_payment_id');
            const lastBookingId = localStorage.getItem('last_booking_id');
            const apiBaseUrl = window.location.protocol === 'file:' ? 'http://localhost:8000/' : '';

            console.log("Checking payment confirmation details:", { paymentId, lastBookingId });

            if (paymentId && lastBookingId) {
                fetch(apiBaseUrl + 'update_payment_status.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: lastBookingId,
                        status: 'Completed'
                    })
                })
                .then(res => res.json())
                .then(data => {
                    console.log("Payment status updated in database:", data);
                    if (data.status === 'success') {
                        // Clear the stored booking ID so we don't repeat the update
                        localStorage.removeItem('last_booking_id');
                    }
                })
                .catch(err => {
                    console.error("Failed to update payment status in database:", err);
                });
            }
        });
    </script>
</body>
</html>
